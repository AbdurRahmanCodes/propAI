services:
  - type: web
    name: propai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: DB_NAME
        value: propai
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173
      - key: PERFORMANCE_WINDOW_SIZE
        value: "500"
      - key: MONGODB_URI
        sync: false
      - key: SECRET_KEY
        sync: false
